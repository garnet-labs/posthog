procs:
    # E2E test runner with Playwright UI
    playwright:
        shell: 'pnpm --filter=@posthog/frontend build:products && pnpm --filter=@posthog/playwright exec playwright test --ui'
        env:
            BASE_URL: 'http://localhost:8010'

    backend:
        shell: 'uv sync --active && bin/wait-for-docker && bin/e2e-db-snapshot ensure && ./bin/start-backend'
        env:
            DATABASE_URL: 'postgres://posthog:posthog@localhost:5432/posthog_e2e_test'
            CLICKHOUSE_DATABASE: 'posthog_test'
            CLOUD_DEPLOYMENT: 'E2E'
            SECRET_KEY: 'e2e_test'
            SECURE_COOKIES: '0'
            SKIP_SERVICE_VERSION_REQUIREMENTS: '1'
            DEBUG: '1'
            E2E_TESTING: '1'

    celery-worker:
        shell: 'uv sync --active && bin/wait-for-docker && bin/e2e-db-snapshot ensure && ./bin/start-celery worker'
        env:
            DATABASE_URL: 'postgres://posthog:posthog@localhost:5432/posthog_e2e_test'
            CLICKHOUSE_DATABASE: 'posthog_test'
            CLOUD_DEPLOYMENT: 'E2E'
            SECRET_KEY: 'e2e_test'
            SECURE_COOKIES: '0'
            SKIP_SERVICE_VERSION_REQUIREMENTS: '1'
            DEBUG: '1'
            E2E_TESTING: '1'

    frontend:
        shell: './bin/start-frontend'
        env:
            E2E_TESTING: '1'

    docker-compose:
        shell: 'docker compose -f docker-compose.dev.yml -f docker-compose.profiles.yml up --pull always -d && echo "docker-compose ready" && docker compose -f docker-compose.dev.yml -f docker-compose.profiles.yml logs --tail=100 -f'
        ready_pattern: 'docker-compose ready'

    # Fast restores from snapshot (seconds). Run rebuild-snapshot first if you haven't yet.
    restore-db:
        shell: 'bin/wait-for-docker && bin/e2e-db-snapshot restore'
        autostart: false
        env:
            DATABASE_URL: 'postgres://posthog:posthog@localhost:5432/posthog_e2e_test'
            CLICKHOUSE_DATABASE: 'posthog_test'
            CLOUD_DEPLOYMENT: 'E2E'
            SECRET_KEY: 'e2e_test'
            DEBUG: '1'
            E2E_TESTING: '1'

    # Fully runs all migrations + setup_dev, then saves a snapshot. Slow, do once.
    rebuild-snapshot:
        shell: 'bin/wait-for-docker && bin/e2e-db-snapshot create'
        autostart: false
        env:
            DATABASE_URL: 'postgres://posthog:posthog@localhost:5432/posthog_e2e_test'
            CLICKHOUSE_DATABASE: 'posthog_test'
            CLOUD_DEPLOYMENT: 'E2E'
            SECRET_KEY: 'e2e_test'
            DEBUG: '1'
            E2E_TESTING: '1'

mouse_scroll_speed: 1
scrollback: 10000
