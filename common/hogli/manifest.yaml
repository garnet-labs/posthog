db:
    db:pg:
        cmd: psql postgres://posthog:posthog@localhost:5432/posthog
        description: Connect to local PostgreSQL (extra args passed to psql)
        services:
            - postgresql
    db:ch:
        cmd: clickhouse client --host localhost --port 9000 --user default
        description: Connect to local ClickHouse (extra args passed to clickhouse client)
        services:
            - clickhouse
    db:dg:
        cmd: psql postgres://posthog:posthog@localhost:15432/ducklake
        description: Connect to local Duckgres (extra args passed to psql)
    db:upgrade:
        bin_script: upgrade-postgres
        description: Upgrade PostgreSQL from version 12 to 15 (interactive migration tool)
        services:
            - postgresql
            - docker
    db:dump:
        cmd: "mkdir -p .postgres-backups\nBACKUP_FILE=\"${1:-.postgres-backups/posthog_backup_$(date\
            \ +%Y%m%d_%H%M%S).sql.gz}\"\ndocker compose exec -T db pg_dumpall --clean -U\
            \ posthog | gzip > \"$BACKUP_FILE\"\necho \"\u2705 Backup saved to: $BACKUP_FILE\"\
            \n"
        description: Dump all PostgreSQL databases to compressed backup file
        services:
            - postgresql
            - docker
    db:restore:
        cmd: "set -e\nset -o pipefail\nif [ -z \"$1\" ]; then\n    LATEST=$(ls -t .postgres-backups/*.sql.gz\
            \ 2>/dev/null | head -1)\n    if [ -z \"$LATEST\" ]; then\n        echo \"\u274C\
            \ Error: No backup file specified and no backups found in .postgres-backups/\"\
            \n        echo \"Usage: hogli db:restore [backup-file]\"\n        exit 1\n \
            \   fi\n    echo \"Using latest backup: $LATEST\"\n    BACKUP_FILE=\"$LATEST\"\
            \nelse\n    BACKUP_FILE=\"$1\"\nfi\nif [ ! -f \"$BACKUP_FILE\" ]; then\n   \
            \ echo \"\u274C Error: Backup file not found: $BACKUP_FILE\"\n    exit 1\nfi\n\
            gunzip -c \"$BACKUP_FILE\" | docker compose exec -T db psql -q -U posthog >\
            \ /dev/null 2>&1\necho \"\U0001F510 Upgrading password to SCRAM-SHA-256...\"\
            \ndocker compose exec -T db psql -U posthog -c \"ALTER USER posthog WITH PASSWORD\
            \ 'posthog';\" > /dev/null 2>&1\necho \"\u2705 Restored from: $BACKUP_FILE\"\
            \n"
        description: Restore PostgreSQL databases from backup file (defaults to latest)
        services:
            - postgresql
            - docker
    db:download-schema:
        cmd: "set -e\nmkdir -p .postgres-backups\necho \"Finding latest CI run with migrated-schema\
            \ artifact...\"\nRUN_ID=$(gh api 'repos/PostHog/posthog/actions/artifacts?name=migrated-schema&per_page=10'\
            \ --jq '[.artifacts[] | select(.expired == false and .size_in_bytes > 10000)]\
            \ | .[0].workflow_run.id')\nif [ -z \"$RUN_ID\" ]; then\n    echo \"\u274C No\
            \ migrated-schema artifact found. Has CI run on master yet?\"\n    exit 1\n\
            fi\necho \"Downloading from run $RUN_ID...\"\ngh run download \"$RUN_ID\" --name\
            \ migrated-schema -R PostHog/posthog -D /tmp/migrated-schema-dl\nmv /tmp/migrated-schema-dl/schema.sql.gz\
            \ .postgres-backups/schema-latest.sql.gz\nrm -rf /tmp/migrated-schema-dl\necho\
            \ \"\u2705 Downloaded to .postgres-backups/schema-latest.sql.gz\"\n"
        description: Download pre-migrated schema artifact from CI (requires gh CLI)
    db:restore-schema:
        steps:
            - db:download-schema
            - db:dump
            - name: restore-schema
              cmd: "set -e\nset -o pipefail\necho \"Restoring schema to database...\"\ngunzip\
                  \ -c .postgres-backups/schema-latest.sql.gz | docker compose exec -T db psql\
                  \ -q -U posthog posthog\necho \"\u2705 Schema restored\"\n"
            - db:migrate
            - name: ensure-migration-defaults
              cmd: 'set -e

                  echo "Ensuring default migration data..."

                  python manage.py ensure_migration_defaults

                  '
        description: Fetch pre-migrated schema from CI, restore it, and run any pending
            migrations (creates backup first)
        prompt: true
        services:
            - postgresql
            - docker
