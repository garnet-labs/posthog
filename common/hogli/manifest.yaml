        hidden: true
    check:video-deps:
        bin_script: check_video_deps
        description: Install and verify Playwright browsers and FFmpeg dependencies
        hidden: true
    services:ready:
        bin_script: wait-for-docker
        description: Wait for all Docker Compose services to pass health checks
start:
