quality:
    lint:
        cmd: ./bin/ruff.sh check . && pnpm --filter=@posthog/frontend run lint
        description: Run Python and JS/TS linting
    format:
        cmd: pnpm format
        description: Format both backend and frontend code
    format:yaml:
        cmd: pnpm exec oxfmt --no-error-on-unmatched-pattern "$@"
        description: Format JSON, YAML files
    format:css:
        cmd: pnpm stylelint --fix --allow-empty-input "$@" && pnpm exec oxfmt --no-error-on-unmatched-pattern
            "$@"
        description: Format CSS/SCSS files
    format:js:
        cmd: pnpm oxlint --fix --fix-suggestions --quiet "$@" && pnpm exec oxfmt --no-error-on-unmatched-pattern
            "$@"
        description: Format JavaScript/TypeScript files (frontend)
    format:nodejs:
        cmd: pnpm --dir nodejs exec eslint --fix "$@" && pnpm --dir nodejs exec prettier
            --write "$@"
        description: Format nodejs JavaScript files
    format:rust:
        cmd: rustfmt
        description: Format Rust files
    format:python:
        cmd: ./bin/ruff.sh format
        description: Format Python files
    lint:skills:
        cmd: python products/posthog_ai/scripts/build_skills.py --lint
        description: Validate agent skill sources (syntax, frontmatter, depth constraints)
    lint:python:fix:
        cmd: ./bin/ruff.sh check --fix
        description: Fix Python code quality issues
    format:markdown:
        cmd: pnpm exec markdownlint-cli2 --config .config/.markdownlint-cli2.jsonc --fix
            "$@" && pnpm exec oxfmt --no-error-on-unmatched-pattern "$@"
        description: Format Markdown files
    format:mcp:
        cmd: pnpm run --filter @posthog/mcp format
        description: Format MCP files
