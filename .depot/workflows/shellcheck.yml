# Depot CI Migration
# Source: .github/workflows/shellcheck.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: shellcheck
on:
    pull_request:
    merge_group:
permissions:
    contents: read
jobs:
    shell_check:
        runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
        timeout-minutes: 5
        name: shellcheck
        steps:
            - uses: actions/checkout@v6
            - name: Install shellcheck
              run: sudo apt update && sudo apt install -y shellcheck
            - name: Check secrets scripts
              run: cd bin && shellcheck deploy-hobby
