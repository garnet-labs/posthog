# Depot CI Migration
# Source: .github/workflows/ci-survey-sdk-check.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: Survey SDK Version Check
on:
    pull_request:
        paths:
            - 'frontend/src/scenes/surveys/**'
            - 'docs/published/surveys/**'
            - 'frontend/bin/build-survey-sdk-docs.ts'
permissions:
    contents: read
    pull-requests: write
jobs:
    check-sdk-requirements:
        name: Check for SDK version requirements
        runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
        timeout-minutes: 5
        steps:
            - name: Check for SDK-related changes
              id: sdk-check
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  # Check added lines for SDK version patterns
                  if gh pr diff ${{ github.event.pull_request.number }} \
                      | grep '^+' | grep -v '^+++' \
                      | grep -qiE 'posthog-js|posthog-react-native|posthog-ios|posthog-android|[0-9]+\.[0-9]+\.[0-9]+'; then
                      echo "found=true" >> $GITHUB_OUTPUT
                  fi
            - name: Post reminder comment
              if: steps.sdk-check.outputs.found == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: "# Check if reminder comment already exists\nif gh pr view ${{ github.event.pull_request.number }} --json comments \\\n    --jq '.comments[].body' | grep -q 'SDK Version Check Reminder'; then\n    echo \"Comment already exists, skipping\"\n    exit 0\nfi\n\ngh pr comment ${{ github.event.pull_request.number }} --body '### \U0001F4E6 Surveys SDK Version Check Reminder\n\nThis PR modifies survey code and may include SDK-dependent features.\n\n**If adding a feature that requires a minimum SDK version**, please update:\n`frontend/src/scenes/surveys/surveyVersionRequirements.ts`\n\nThis ensures users see warnings when launching surveys their SDK doesn'\\''t support.'\n"
    check-docs-generated:
        name: Check SDK docs are up to date
        uses: ./.github/workflows/ci-docs-check.yml
        with:
            source_file: frontend/src/scenes/surveys/surveyVersionRequirements.ts
            build_command: pnpm --filter=@posthog/frontend build:survey-sdk-docs
            output_file: docs/published/docs/surveys/sdk-feature-support.mdx
            fail_on_outdated: true
