ecosystem: person_distinct_id_overrides
cluster: main
tables:
  person_distinct_id_overrides:
    engine: ReplicatedReplacingMergeTree
    sharded: false
    on_nodes: DATA
    order_by:
    - team_id
    - distinct_id
    settings:
      index_granularity: '512'
    columns:
    - name: team_id
      type: Int64
    - name: distinct_id
      type: String
    - name: person_id
      type: UUID
    - name: is_deleted
      type: Int8
    - name: version
      type: Int64
  person_distinct_id_overrides_dict:
    engine: Dictionary
    on_nodes: ALL
    columns:
    - name: team_id
      type: Int64
    - name: distinct_id
      type: String
    - name: person_id
      type: UUID
