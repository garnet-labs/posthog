ecosystem: document_embeddings
cluster: main
tables:
  distributed_posthog_document_embeddings:
    engine: Distributed
    source: partitioned_sharded_posthog_document_embeddings
    sharding_key: cityHash64(document_id)
    on_nodes:
    - DATA
    - COORDINATOR
    columns: inherit partitioned_sharded_posthog_document_embeddings
  writable_posthog_document_embeddings:
    engine: Distributed
    source: partitioned_sharded_posthog_document_embeddings
    sharding_key: cityHash64(document_id)
    on_nodes: INGESTION_SMALL
    columns: inherit partitioned_sharded_posthog_document_embeddings
  sharded_posthog_document_embeddings_buffer:
    engine: ReplicatedReplacingMergeTree
    sharded: true
    on_nodes: DATA
    order_by:
    - inserted_at
    - model_name
    - cityHash64(document_id)
    partition_by: toDate(inserted_at)
    settings:
      index_granularity: '8192'
      ttl_only_drop_parts: '1'
    columns:
    - name: team_id
      type: Int64
    - name: product
      type: LowCardinality(String)
    - name: document_type
      type: LowCardinality(String)
    - name: model_name
      type: LowCardinality(String)
    - name: rendering
      type: LowCardinality(String)
    - name: document_id
      type: String
    - name: timestamp
      type: DateTime64(3, 'UTC')
    - name: inserted_at
      type: DateTime64(3, 'UTC')
    - name: content
      type: String
      default_expression: ''''''
      default_kind: DEFAULT
    - name: metadata
      type: String
      default_expression: '''{}'''
      default_kind: DEFAULT
    - name: embedding
      type: Array(Float64)
    - name: _timestamp
      type: DateTime
    - name: _offset
      type: UInt64
    - name: _partition
      type: UInt64
