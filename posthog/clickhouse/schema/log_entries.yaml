ecosystem: log_entries
cluster: main
tables:
  log_entries:
    engine: ReplicatedReplacingMergeTree
    sharded: false
    on_nodes: DATA
    order_by:
    - team_id
    - log_source
    - log_source_id
    - instance_id
    - timestamp
    partition_by: toStartOfHour(timestamp)
    settings:
      index_granularity: '512'
    columns:
    - name: team_id
      type: UInt64
    - name: log_source
      type: LowCardinality(String)
    - name: log_source_id
      type: String
    - name: instance_id
      type: String
    - name: timestamp
      type: DateTime64(6, 'UTC')
    - name: level
      type: LowCardinality(String)
    - name: message
      type: String
  sharded_log_entries:
    engine: ReplicatedReplacingMergeTree
    sharded: true
    on_nodes: DATA
    order_by:
    - team_id
    - log_source
    - log_source_id
    - instance_id
    - timestamp
    partition_by: toYYYYMMDD(timestamp)
    settings:
      index_granularity: '1024'
      ttl_only_drop_parts: '1'
    columns:
    - name: team_id
      type: UInt64
    - name: log_source
      type: LowCardinality(String)
    - name: log_source_id
      type: String
    - name: instance_id
      type: String
    - name: timestamp
      type: DateTime64(6, 'UTC')
    - name: level
      type: LowCardinality(String)
    - name: message
      type: String
  distributed_log_entries:
    engine: Distributed
    source: sharded_log_entries
    sharding_key: rand()
    on_nodes: ALL
    columns: inherit sharded_log_entries
  kafka_log_entries:
    engine: Kafka
    on_nodes: ALL
    settings:
      kafka_broker_list: __from_settings__
      kafka_topic_list: log_entries
      kafka_group_name: log_entries
      kafka_format: JSONEachRow
    columns:
    - name: team_id
      type: UInt64
    - name: log_source
      type: LowCardinality(String)
    - name: log_source_id
      type: String
    - name: instance_id
      type: String
    - name: timestamp
      type: DateTime64(6, 'UTC')
    - name: level
      type: LowCardinality(String)
    - name: message
      type: String
