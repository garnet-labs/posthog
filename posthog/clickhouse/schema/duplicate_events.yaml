ecosystem: duplicate_events
cluster: main
tables:
  duplicate_events:
    engine: ReplicatedMergeTree
    sharded: false
    on_nodes: DATA
    order_by:
    - team_id
    - distinct_id
    - event
    - inserted_at
    partition_by: toYYYYMMDD(inserted_at)
    settings:
      index_granularity: '512'
    columns:
    - name: team_id
      type: Int64
    - name: distinct_id
      type: String
    - name: event
      type: String
    - name: source_uuid
      type: UUID
    - name: duplicate_uuid
      type: UUID
    - name: similarity_score
      type: Float64
    - name: dedup_type
      type: LowCardinality(String)
    - name: is_confirmed
      type: UInt8
    - name: reason
      type: Nullable(String)
    - name: version
      type: String
    - name: different_property_count
      type: UInt32
    - name: properties_similarity
      type: Float64
    - name: source_message
      type: String
    - name: duplicate_message
      type: String
    - name: distinct_fields
      type: Array(Tuple(field_name String, original_value String, new_value String))
    - name: inserted_at
      type: DateTime64(3, 'UTC')
