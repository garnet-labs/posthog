ecosystem: groups
cluster: main
tables:
  groups:
    engine: ReplicatedReplacingMergeTree
    sharded: false
    on_nodes: DATA
    order_by:
    - team_id
    - group_type_index
    - group_key
    columns:
    - name: group_type_index
      type: UInt8
    - name: group_key
      type: String
    - name: created_at
      type: DateTime64(3)
    - name: team_id
      type: Int64
    - name: group_properties
      type: String
