ecosystem: error_tracking
cluster: main
tables:
  error_tracking_issue_fingerprint_overrides:
    engine: ReplicatedReplacingMergeTree
    sharded: false
    on_nodes: DATA
    order_by:
    - team_id
    - fingerprint
    settings:
      index_granularity: '512'
    columns:
    - name: team_id
      type: Int64
    - name: fingerprint
      type: String
    - name: issue_id
      type: UUID
    - name: is_deleted
      type: Int8
    - name: version
      type: Int64
