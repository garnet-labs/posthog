ecosystem: plugin_log_entries
cluster: main
tables:
  plugin_log_entries:
    engine: ReplicatedReplacingMergeTree
    sharded: false
    on_nodes: DATA
    order_by:
    - team_id
    - plugin_id
    - plugin_config_id
    - timestamp
    partition_by: toYYYYMMDD(timestamp)
    settings:
      index_granularity: '512'
    columns:
    - name: id
      type: UUID
    - name: team_id
      type: Int64
    - name: plugin_id
      type: Int64
    - name: plugin_config_id
      type: Int64
    - name: timestamp
      type: DateTime64(6, 'UTC')
    - name: source
      type: String
    - name: type
      type: String
    - name: message
      type: String
    - name: instance_id
      type: UUID
    - name: _timestamp
      type: DateTime
    - name: _offset
      type: UInt64
