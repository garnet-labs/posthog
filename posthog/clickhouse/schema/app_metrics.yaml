ecosystem: app_metrics
cluster: main
tables:
  sharded_app_metrics:
    engine: ReplicatedAggregatingMergeTree
    sharded: true
    on_nodes: DATA
    order_by:
    - team_id
    - plugin_config_id
    - job_id
    - category
    - toStartOfHour(timestamp)
    - error_type
    - error_uuid
    partition_by: toYYYYMM(timestamp)
    columns:
    - name: team_id
      type: Int64
    - name: timestamp
      type: DateTime64(6, 'UTC')
    - name: plugin_config_id
      type: Int64
    - name: category
      type: LowCardinality(String)
    - name: job_id
      type: String
    - name: successes
      type: SimpleAggregateFunction(sum, Int64)
    - name: successes_on_retry
      type: SimpleAggregateFunction(sum, Int64)
    - name: failures
      type: SimpleAggregateFunction(sum, Int64)
    - name: error_uuid
      type: UUID
    - name: error_type
      type: String
    - name: error_details
      type: String
  app_metrics:
    engine: Distributed
    source: sharded_app_metrics
    sharding_key: rand()
    on_nodes: ALL
    columns: inherit sharded_app_metrics
