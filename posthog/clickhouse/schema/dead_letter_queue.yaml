ecosystem: dead_letter_queue
cluster: main
tables:
  events_dead_letter_queue:
    engine: ReplicatedReplacingMergeTree
    sharded: false
    on_nodes: ALL
    order_by:
    - id
    - event_uuid
    - distinct_id
    - team_id
    settings:
      index_granularity: '512'
    columns:
    - name: id
      type: UUID
    - name: event_uuid
      type: UUID
    - name: event
      type: String
    - name: properties
      type: String
    - name: distinct_id
      type: String
    - name: team_id
      type: Int64
    - name: elements_chain
      type: String
    - name: created_at
      type: DateTime64(6, 'UTC')
    - name: ip
      type: String
    - name: site_url
      type: String
    - name: now
      type: DateTime64(6, 'UTC')
    - name: raw_payload
      type: String
    - name: error_timestamp
      type: DateTime64(6, 'UTC')
    - name: error_location
      type: String
    - name: error
      type: String
    - name: tags
      type: Array(String)
    - name: _timestamp
      type: DateTime
    - name: _offset
      type: UInt64
