ecosystem: cohort_membership
cluster: main
tables:
  cohort_membership:
    engine: ReplicatedReplacingMergeTree
    sharded: false
    on_nodes: DATA
    order_by:
    - team_id
    - cohort_id
    - person_id
    columns:
    - name: team_id
      type: Int64
    - name: cohort_id
      type: Int64
    - name: person_id
      type: UUID
    - name: status
      type: Enum8('entered' = 1, 'left' = 2)
    - name: last_updated
      type: DateTime64(6)
      default_expression: now64()
      default_kind: DEFAULT
