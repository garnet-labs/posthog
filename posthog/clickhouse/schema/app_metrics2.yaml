ecosystem: app_metrics2
cluster: main
tables:
  sharded_app_metrics2:
    engine: ReplicatedAggregatingMergeTree
    sharded: true
    on_nodes: DATA
    order_by:
    - team_id
    - app_source
    - app_source_id
    - instance_id
    - toStartOfHour(timestamp)
    - metric_kind
    - metric_name
    partition_by: toYYYYMM(timestamp)
    columns:
    - name: team_id
      type: Int64
    - name: timestamp
      type: DateTime64(6, 'UTC')
    - name: app_source
      type: LowCardinality(String)
    - name: app_source_id
      type: String
    - name: instance_id
      type: String
    - name: metric_kind
      type: LowCardinality(String)
    - name: metric_name
      type: LowCardinality(String)
    - name: count
      type: SimpleAggregateFunction(sum, Int64)
  app_metrics2:
    engine: Distributed
    source: sharded_app_metrics2
    sharding_key: rand()
    on_nodes: ALL
    columns: inherit sharded_app_metrics2
