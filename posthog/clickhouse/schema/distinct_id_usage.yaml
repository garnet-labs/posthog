ecosystem: distinct_id_usage
cluster: main
tables:
  sharded_distinct_id_usage:
    engine: ReplicatedSummingMergeTree
    sharded: true
    on_nodes: DATA
    order_by:
    - team_id
    - minute
    - distinct_id
    partition_by: toYYYYMMDD(minute)
    settings:
      ttl_only_drop_parts: '1'
    columns:
    - name: team_id
      type: Int64
    - name: distinct_id
      type: String
    - name: minute
      type: DateTime
    - name: event_count
      type: UInt64
  writable_distinct_id_usage:
    engine: Distributed
    source: sharded_distinct_id_usage
    sharding_key: sipHash64(distinct_id)
    on_nodes: COORDINATOR
    columns: inherit sharded_distinct_id_usage
  distinct_id_usage:
    engine: Distributed
    source: sharded_distinct_id_usage
    sharding_key: sipHash64(distinct_id)
    on_nodes: ALL
    columns: inherit sharded_distinct_id_usage
