ecosystem: precalculated_person_properties
cluster: main
tables:
  sharded_precalculated_person_properties:
    engine: ReplicatedReplacingMergeTree
    sharded: true
    on_nodes: DATA
    order_by:
    - team_id
    - condition
    - distinct_id
    columns:
    - name: team_id
      type: Int64
    - name: distinct_id
      type: String
    - name: person_id
      type: UUID
    - name: condition
      type: String
    - name: matches
      type: Bool
    - name: source
      type: String
  precalculated_person_properties:
    engine: Distributed
    source: sharded_precalculated_person_properties
    sharding_key: sipHash64(distinct_id)
    on_nodes: ALL
    columns: inherit sharded_precalculated_person_properties
