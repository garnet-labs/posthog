ecosystem: precalculated_events
cluster: main
tables:
  sharded_precalculated_events:
    engine: ReplicatedReplacingMergeTree
    sharded: true
    on_nodes: DATA
    order_by:
    - team_id
    - condition
    - date
    - distinct_id
    - uuid
    partition_by: toYYYYMM(date)
    columns:
    - name: team_id
      type: Int64
    - name: date
      type: Date
    - name: distinct_id
      type: String
    - name: person_id
      type: UUID
    - name: condition
      type: String
    - name: uuid
      type: UUID
    - name: source
      type: String
  precalculated_events:
    engine: Distributed
    source: sharded_precalculated_events
    sharding_key: sipHash64(distinct_id)
    on_nodes: ALL
    columns: inherit sharded_precalculated_events
