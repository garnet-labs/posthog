# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: Logs
feature: logs
url_prefix: /logs
tools:
    logs-alerts-list:
        operation: logs_alerts_list
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        mcp_version: 1
        title: List log alerts
        description: >
            List log alert configurations in the current project, newest first. Returns alert name, state, threshold,
            filters, and scheduling details. Use this to review existing alerts before creating or modifying them.
    logs-alerts-create:
        operation: logs_alerts_create
        enabled: true
        scopes:
            - logs:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Create log alert
        description: >
            Create a threshold-based alert on log streams. The alert periodically counts log entries matching the given
            filters and fires when the count crosses the threshold. Maximum 20 alerts per project.
        exclude_params:
            - id
            - state
            - check_interval_minutes
            - next_check_at
            - last_notified_at
            - last_checked_at
            - consecutive_failures
            - created_at
            - created_by
            - updated_at
    logs-alerts-retrieve:
        operation: logs_alerts_retrieve
        enabled: true
        scopes:
            - logs:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        mcp_version: 1
        title: Get log alert
        description: >
            Get a log alert configuration by ID. Returns full details including current state, threshold settings,
            filters, and scheduling information.
    logs-alerts-partial-update:
        operation: logs_alerts_partial_update
        enabled: true
        scopes:
            - logs:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        title: Update log alert
        description: >
            Update a log alert configuration by ID. Only the fields you provide are changed. Use this to adjust
            thresholds, filters, enable/disable alerts, or snooze them.
        exclude_params:
            - id
            - state
            - check_interval_minutes
            - next_check_at
            - last_notified_at
            - last_checked_at
            - consecutive_failures
            - created_at
            - created_by
            - updated_at
    logs-alerts-destroy:
        operation: logs_alerts_destroy
        enabled: true
        scopes:
            - logs:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete log alert
        description: >
            Permanently delete a log alert configuration by ID.
    logs-explainLogWithAI-create:
        operation: logs_explainLogWithAI_create
        enabled: false
    logs-alerts-update:
        operation: logs_alerts_update
        enabled: false
    logs-attributes-retrieve:
        operation: logs_attributes_retrieve
        enabled: false
    logs-export-create:
        operation: logs_export_create
        enabled: false
    logs-has-logs-retrieve:
        operation: logs_has_logs_retrieve
        enabled: false
    logs-query-create:
        operation: logs_query_create
        enabled: false
    logs-sparkline-create:
        operation: logs_sparkline_create
        enabled: false
    logs-values-retrieve:
        operation: logs_values_retrieve
        enabled: false
    batch-exports-logs-retrieve:
        operation: batch_exports_logs_retrieve
        enabled: false
    domains-scim-logs-retrieve:
        operation: domains_scim_logs_retrieve
        enabled: false
    batch-exports-runs-logs-retrieve:
        operation: batch_exports_runs_logs_retrieve
        enabled: false
    hog-flow-templates-logs-retrieve:
        operation: hog_flow_templates_logs_retrieve
        enabled: false
    hog-flows-logs-retrieve:
        operation: hog_flows_logs_retrieve
        enabled: false
    hog-functions-logs-retrieve:
        operation: hog_functions_logs_retrieve
        enabled: false
    plugin-configs-logs-list:
        operation: plugin_configs_logs_list
        enabled: false
    tasks-runs-logs-retrieve:
        operation: tasks_runs_logs_retrieve
        enabled: false
