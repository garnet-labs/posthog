# MCP tool definition — tool entries are scaffolded from the OpenAPI schema.
# The tool list and operation IDs are kept in sync automatically:
#   pnpm --filter=@posthog/mcp run scaffold-yaml -- --sync-all
#
# To enable a tool, set enabled: true and add required scopes + annotations.
# All other fields (title, description, enrich_url, etc.) are yours to configure.
category: AI
feature: action_prediction_models
url_prefix: /action_prediction_models
tools:
    action-prediction-model-list:
        operation: action_prediction_models_list
        enabled: true
        scopes:
            - action_prediction_model:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List action prediction models
        description: >
            List all action prediction models in the current project. Returns name, description, action or event
            reference, lookback period, and creation metadata for each model.
        mcp_version: 1
    action-prediction-model-create:
        operation: action_prediction_models_create
        enabled: true
        scopes:
            - action_prediction_model:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Create action prediction model
        description: >
            Create a new action prediction model. Specify either an action ID or an event name (not both), and a
            lookback period in days.
        include_params:
            - name
            - description
            - action
            - event_name
            - lookback_days
    action-prediction-model-partial-update:
        operation: action_prediction_models_partial_update
        enabled: true
        scopes:
            - action_prediction_model:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Update action prediction model
        description: >
            Update an action prediction model by ID. Can modify name,
            description, the action or event reference, and lookback period.
        include_params:
            - name
            - description
            - action
            - event_name
            - lookback_days
    action-prediction-model-update:
        operation: action_prediction_models_update
        enabled: false
    action-prediction-model-destroy:
        operation: action_prediction_models_destroy
        enabled: true
        scopes:
            - action_prediction_model:write
        annotations:
            readOnly: false
            destructive: true
            idempotent: true
        title: Delete action prediction model
        description: >
            Permanently delete an action prediction model by ID.
    action-prediction-model-upload-url:
        operation: action_prediction_models_upload_url_create
        enabled: true
        scopes:
            - action_prediction_model:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        title: Generate model artifact upload URL
        description: >
            Generate a presigned S3 upload URL for a model artifact. Returns a
            URL and form fields for direct upload to S3, plus a storage_path to
            use as model_url when creating an ActionPredictionModelRun. Each
            call produces a unique storage path, so call once per artifact.
        param_overrides:
            filename:
                description: >
                    Name of the file to upload, e.g. "xgboost_v1.pkl".
    prediction-model-run-list:
        operation: action_prediction_model_runs_list
        enabled: true
        scopes:
            - action_prediction_model:read
        annotations:
            readOnly: true
            destructive: false
            idempotent: true
        list: true
        title: List prediction model runs
        description: >
            List training runs for action prediction models, newest first. Returns winning status, S3 model URL,
            evaluation metrics, feature importance, and the training artifact script.
        mcp_version: 1
    prediction-model-run-create:
        operation: action_prediction_model_runs_create
        enabled: true
        scopes:
            - action_prediction_model:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: false
        enrich_url: '{id}'
        title: Create prediction model run
        description: >
            Record a new training run for a prediction model. Provide the parent prediction model ID, S3 model URL,
            evaluation metrics, feature importance scores, and the artifact script.
        include_params:
            - prediction_model
            - task_run
            - is_winning
            - model_url
            - metrics
            - feature_importance
            - artifact_script
    prediction-model-run-partial-update:
        operation: action_prediction_model_runs_partial_update
        enabled: true
        scopes:
            - action_prediction_model:write
        annotations:
            readOnly: false
            destructive: false
            idempotent: true
        enrich_url: '{id}'
        title: Update prediction model run
        description: >
            Update a prediction model run by ID. Can change winning status,
            metrics, feature importance, or artifact script.
        include_params:
            - task_run
            - is_winning
            - model_url
            - metrics
            - feature_importance
            - artifact_script
    prediction-model-run-update:
        operation: action_prediction_model_runs_update
        enabled: false
    prediction-model-run-destroy:
        operation: action_prediction_model_runs_destroy
        enabled: false
    mcp-tools-create:
        operation: mcp_tools_create
        enabled: false
