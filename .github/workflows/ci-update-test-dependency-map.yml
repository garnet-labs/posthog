name: Backend CI - Update test dependency map

on:
    workflow_dispatch: {}
    schedule:
        # Run weekly on Sunday at 4am UTC (1 hour after test timing update)
        - cron: '0 4 * * 0'

permissions:
    contents: write
    pull-requests: write

jobs:
    update-map:
        name: Rebuild test dependency map
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Get app token
              id: app-token
              uses: getsentry/action-github-app-token@d4b5da6c5e37703f8c3b3e43abb5705b46e159cc # v3.0.0
              with:
                  app_id: ${{ secrets.GH_APP_POSTHOG_TESTS_APP_ID }}
                  private_key: ${{ secrets.GH_APP_POSTHOG_TESTS_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  ref: master
                  token: ${{ steps.app-token.outputs.token }}

            - name: Install uv
              uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
              with:
                  version: '0.10.2'

            - name: Build test dependency map
              run: uv run bin/build_test_dependency_map.py

            - name: Check for changes
              id: check-changes
              run: |
                  if git diff --quiet .test_dependency_map.json 2>/dev/null; then
                      if [ ! -f .test_dependency_map.json ]; then
                          echo "New map file created"
                          echo "changed=true" >> $GITHUB_OUTPUT
                      else
                          echo "No changes to dependency map"
                          echo "changed=false" >> $GITHUB_OUTPUT
                      fi
                  else
                      echo "Dependency map updated"
                      echo "changed=true" >> $GITHUB_OUTPUT
                      git diff --stat .test_dependency_map.json
                  fi

            - name: Clean up stale branch
              if: steps.check-changes.outputs.changed == 'false'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "chore/update-test-dependency-map" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    gh pr close "$existing_pr" --delete-branch || true
                    echo "Closed stale PR #$existing_pr and deleted branch"
                  fi

            - name: Commit via GitHub API (signed)
              if: steps.check-changes.outputs.changed == 'true'
              uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
              with:
                  commit_message: 'chore(ci): update test dependency map'
                  repo: ${{ github.repository }}
                  branch: chore/update-test-dependency-map
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Create pull request
              if: steps.check-changes.outputs.changed == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  existing_pr=$(gh pr list --head "chore/update-test-dependency-map" --json number --jq '.[0].number' 2>/dev/null || true)
                  if [ -n "$existing_pr" ]; then
                    echo "PR #$existing_pr already exists -- updated by commit"
                  else
                    gh pr create \
                      --title "chore(ci): update test dependency map" \
                      --body "Automated weekly rebuild of the test dependency map used by intelligent test selection.

This map powers the \`compute-affected-tests\` CI job, which determines which Django tests to run based on the files changed in a PR. Keeping it fresh ensures test selection accuracy.

Stats from this build are in the commit." \
                      --base master \
                      --head chore/update-test-dependency-map \
                      --reviewer "PostHog/team-devex"
                  fi
