#
# Build and push PostHog and PostHog Cloud container images
#
# - posthog_build: build and push the PostHog container image to DockerHub
#
# - posthog_cloud_build: build the PostHog Cloud container image using
#   as base image the container image from the previous step. The image is
#   then pushed to AWS ECR.
#
name: Container Images CD

on:
    push:
        branches:
            - master
        paths-ignore:
            - 'rust/**'
            - 'livestream/**'
    workflow_dispatch:

jobs:
    posthog_build:
        name: Build and push PostHog
        if: github.repository == 'PostHog/posthog'
        runs-on: depot-ubuntu-latest
        timeout-minutes: 30
        permissions:
            id-token: write # allow issuing OIDC tokens for this workflow run
            contents: read # allow at least reading the repo contents, add other permissions if necessary
            packages: write # allow push to ghcr.io

        steps:
            - name: Check out
              uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

            - name: Set up QEMU
              uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

            - name: Set up Depot CLI
              uses: depot/setup-action@b0b1ea4f69e92ebf5dea3f8713a1b0c37b2126a5 # v1.6.0

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
              with:
                  role-to-assume: ${{ secrets.AWS_ECR_PUBLISH_IAM_ROLE }}
                  aws-region: us-east-1

            - name: Login to Amazon ECR
              id: aws-ecr
              uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

            - name: Login to DockerHub
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  username: ${{ secrets.DOCKERHUB_USER }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Login to ghcr.io
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
                  logout: false

            - name: Build and push container image
              id: build
              uses: depot/build-push-action@5f3b3c2e5a00f0093de47f657aeaefcedff27d18 # v1.17.0
              with:
                  buildx-fallback: false # the fallback is so slow it's better to just fail
                  push: true
                  tags: ghcr.io/posthog/posthog:latest,ghcr.io/posthog/posthog:${{ github.sha }},posthog/posthog:${{ github.sha }},posthog/posthog:latest,${{ steps.aws-ecr.outputs.registry }}/posthog-cloud:master,${{ steps.aws-ecr.outputs.registry }}/posthog-cloud:${{ github.sha }}
                  platforms: linux/arm64,linux/amd64
                  build-args: |
                      COMMIT_HASH=${{ github.sha }}
                      BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
                  secrets: |
                      posthog_upload_sourcemaps_cli_api_key=${{ secrets.POSTHOG_UPLOAD_SOURCEMAPS_CLI_API_KEY }}

            - name: report failure
              if: failure()
              uses: PostHog/posthog-github-action@eea1405eeb2d1d2259f0ee0b44d7b152869e6840 # v1.1.1
              with:
                  posthog-token: ${{secrets.POSTHOG_API_TOKEN}}
                  event: 'posthog-image-build'
                  properties: '{"status": "failure", "commit_hash": "${{ github.sha }}"}'

            - name: get deployer token
              id: deployer
              uses: getsentry/action-github-app-token@d4b5da6c5e37703f8c3b3e43abb5705b46e159cc # v3.0.0
              with:
                  app_id: ${{ secrets.GH_APP_CHARTS_DEPLOYER_APP_ID }}
                  private_key: ${{ secrets.GH_APP_CHARTS_DEPLOYER_PRIVATE_KEY }}

            - name: get PR labels
              id: labels
              uses: ./.github/actions/get-pr-labels
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Trigger PostHog Cloud deployment from Charts
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "posthog",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Check for changes in nodejs directory or Dockerfiles
              id: check_changes_nodejs
              run: |
                  echo "changed=$((git diff --name-only HEAD^ HEAD | grep -qE '^nodejs/|^Dockerfile$|^Dockerfile\.node$' && echo true) || echo false)" >> $GITHUB_OUTPUT

            - name: Trigger Ingestion Cloud deployment
              if: steps.check_changes_nodejs.outputs.changed == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "ingestion",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ toJson(steps.labels.outputs.labels) }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Check for changes that affect temporal workers
              uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
              id: temporal_changes
              with:
                  filters: |
                      common_temporal:
                        - 'posthog/clickhouse/migrations/**'
                        - 'posthog/migrations/**'
                        - 'posthog/temporal/common/**'
                        - 'posthog/management/commands/start_temporal_worker.py'
                        - 'pyproject.toml'
                        - 'bin/temporal-django-worker'
                      health_check:
                        - 'posthog/temporal/health_checks/**'
                        - 'products/.*/backend/temporal/health_checks/**'
                      batch_exports:
                        - 'products/batch_exports/backend/temporal/**'
                        - 'posthog/batch_exports/**'
                      billing:
                        - 'ee/billing/**'
                        - 'posthog/temporal/quota_limiting/**'
                        - 'posthog/temporal/salesforce_enrichment/**'
                      data_modeling:
                        - 'posthog/hogql/**'
                        - 'posthog/temporal/data_modeling/**'
                        - 'posthog/temporal/data_warehouse/**'
                        - 'posthog/warehouse/**'
                        - 'products/data_modeling/**'
                        - 'products/data_warehouse/**'
                        - 'posthog/management/commands/**'
                      data_warehouse:
                        - 'posthog/hogql/**'
                        - 'posthog/temporal/data_modeling/**'
                        - 'posthog/temporal/data_imports/**'
                        - 'posthog/warehouse/**'
                      ducklake:
                        - 'posthog/temporal/ducklake/**'
                        - 'posthog/ducklake/**'
                      general_purpose:
                        - 'posthog/temporal/subscriptions/**'
                        - 'posthog/temporal/session_recordings/**'
                        - 'posthog/temporal/proxy_service/**'
                        - 'posthog/temporal/usage_reports/**'
                        - 'posthog/temporal/llm_analytics/**'
                        - 'posthog/temporal/product_analytics/**'
                        - 'posthog/temporal/delete_persons/**'
                        - 'posthog/temporal/ingestion_acceptance_test/**'
                      llm_analytics_evals:
                        - 'posthog/temporal/llm_analytics/**'
                        - 'products/llm_analytics/**'
                      max_ai:
                        - '**/*.py'
                      messaging:
                        - 'posthog/temporal/messaging/**'
                      session_replay:
                        - 'posthog/temporal/enforce_max_replay_retention/**'
                        - 'posthog/temporal/delete_recordings/**'
                        - 'posthog/temporal/export_recording/**'
                        - 'posthog/temporal/import_recording/**'
                      tasks_agent:
                        - 'products/tasks/backend/**'
                        - 'posthog/tasks/**'
                      video_export:
                        - 'posthog/temporal/exports_video/**'
                        - 'posthog/tasks/exports/video_exporter.py'
                        - 'products/signals/backend/**'
                        - 'posthog/temporal/data_imports/workflow_activities/emit_signals/**'
                        - 'posthog/temporal/data_imports/signals/**'
                        - 'nodejs/src/scripts/record-replay/**'
                        - 'posthog/temporal/ai/session_summary/**'
                        - 'posthog/temporal/ai/video_segment_clustering/**'
                        - 'ee/hogai/session_summaries/**'
                      weekly_digest:
                        - 'posthog/temporal/weekly_digest/**'

            - name: Trigger Batch Exports Sync Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.batch_exports == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Batch Exports Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.batch_exports == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-batch-exports",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Max AI Temporal worker cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.max_ai == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-max-ai",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Tasks Agent Temporal worker cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.tasks_agent == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-tasks-agent",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Install uv for dependency analysis
              uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
              with:
                  version: '0.10.2' # pinned: unpinned setup-uv calls GH API on every job, exhausts rate limit

            - name: Check for Python dependency changes that affect analytics platform temporal worker
              id: check_python_changes_analytics_platform_temporal_worker
              run: |
                  CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | tr '\n' ' ')
                  RESULT=$(uv run bin/find_python_dependencies.py posthog.temporal.subscriptions --check-changes "$CHANGED_FILES" | jq -r '.affected') || RESULT="true"
                  echo "changed=$RESULT" >> $GITHUB_OUTPUT

            - name: Trigger Billing Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.billing == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-billing",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Video Export Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.video_export == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-video-export",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Session Replay Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.session_replay == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-session-replay",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Weekly Digest Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.weekly_digest == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-weekly-digest",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Analytics Platform Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.check_python_changes_analytics_platform_temporal_worker.outputs.changed == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-analytics-platform",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger General Purpose Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.general_purpose == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-general-purpose",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Health Check Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.health_check == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-health-check",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger LLM Analytics Evals Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.llm_analytics_evals == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-llm-analytics-evals",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            # NOTE: temporal-worker-llm-analytics rollout moved to cd-llm-analytics-image.yml
            # which builds and deploys a separate Docker image with ML dependencies.

            - name: Trigger Messaging Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.messaging == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-messaging",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger DuckLake Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.ducklake == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-ducklake",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Data Warehouse Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.data_warehouse == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-data-warehouse",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Data Warehouse CDP Producer Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.data_warehouse == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-data-warehouse-cdp-producer",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Data Warehouse Modeling Temporal Worker Cloud deployment
              if: steps.temporal_changes.outputs.common_temporal == 'true' || steps.temporal_changes.outputs.data_modeling == 'true'
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: commit_state_update
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ github.sha }}@${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "temporal-worker-data-modeling",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ steps.labels.outputs.labels }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }

            - name: Trigger Dagster Code Location Reload
              uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
              with:
                  token: ${{ steps.deployer.outputs.token }}
                  repository: PostHog/charts
                  event-type: restart_dagster_code_location
                  client-payload: |
                      {
                        "values": {
                          "image": {
                            "sha": "${{ steps.build.outputs.digest }}"
                          }
                        },
                        "release": "dagster-code-location",
                        "commit": ${{ toJson(github.event.head_commit) }},
                        "repository": ${{ toJson(github.repository) }},
                        "labels": ${{ toJson(steps.labels.outputs.labels) }},
                        "timestamp": "${{ github.event.head_commit.timestamp }}"
                      }
